# -*- coding: utf-8 -*-
# ====================================
# ????????? SPRING BOOT
# ====================================

# ??? ??????????
spring.application.name=story_service

# ====================================
# ???? ?????? (PostgreSQL)
# ====================================

# URL ??????????? ? ??
# ??????: jdbc:postgresql://localhost:5432/???_????
spring.datasource.url=DB_URL

# ??? ???????????? ??
spring.datasource.username=DB_USERNAME

# ?????? ???????????? ??
spring.datasource.password=DB_PASSWORD

# ====================================
# HIBERNATE & JPA
# ====================================

# ????????? ?????? ? DDL: update, validate, create-drop, none
spring.jpa.hibernate.ddl-auto=update

# ?????????? SQL ??????? ? ?????
spring.jpa.show-sql=JPA_SHOW_SQL
spring.jpa.properties.hibernate.format_sql=true

# ====================================
# ????????? ???????????
# ====================================

# ??????? ??????????? ??? ????????? ??????
logging.level.root=LOG_ROOT_LEVEL

# ??????? ??????????? ??? ?????? ??????????
logging.level.com.diana.storyplanner=LOG_APP_LEVEL

# ??????? ??????????? ??? Web-????
logging.level.org.springframework.web=LOG_WEB_LEVEL

# ====================================
# ????????? EMAIL (Yandex / SMTP)
# ====================================

spring.mail.host=MAIL_HOST
spring.mail.port=MAIL_PORT
spring.mail.username=MAIL_USERNAME
spring.mail.password=MAIL_PASSWORD
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.socketFactory.port=MAIL_PORT
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# ????? ????????? ??? ?????? ? ???????
client.host=CLIENT_HOST

# ====================================
